<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kỷ Luật Bản Thân</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-gray-50 text-gray-800 font-sans antialiased min-h-screen flex flex-col">

    <nav class="bg-white shadow-sm border-b border-gray-100 sticky top-0 z-50 w-full">
        <div class="w-full mx-auto px-8 py-4 flex justify-between items-center">
            <a href="/" class="text-xl font-bold tracking-tight text-gray-900">
                <span class="text-indigo-600"><i class="fa-solid fa-square-check mr-2"></i>Habit</span><span class="text-indigo-600">Tracker</span>
            </a>
            <div class="text-xs font-semibold text-gray-400 bg-gray-100 px-3 py-1.5 rounded-xl flex items-center gap-1.5">
                <span class="w-2 h-2 rounded-full bg-indigo-500 animate-pulse"></span> Không gian kỷ luật cá nhân
            </div>
        </div>
    </nav>

    <main class="flex-grow w-full py-8">
        {% block content %}{% endblock %}
    </main>

</body>
</html>
